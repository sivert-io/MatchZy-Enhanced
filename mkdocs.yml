site_name: Matchzy Enhanced
site_url: https://me.sivert.io/
site_author: Sivert Gullberg Hansen
site_description: >
  Matchzy Enhanced — an enhanced CS2 MatchZy plugin tailored for tournament automation with MatchZy Auto Tournament.

repo_name: sivert-io/MatchZy
repo_url: https://github.com/sivert-io/MatchZy

copyright: Copyright © 2025 Sivert Gullberg Hansen

# Because mkdocs.yml lives in docs/, use current dir for docs and build to ../site
docs_dir: .
site_dir: ../site

theme:
  name: material
  features:
    - content.code.annotate
    - content.code.copy
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: icon.svg
  logo: icon.svg
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      skip_classes:
        - custom-skip-class-name
      auto_caption: false
      caption_position: bottom
  - exclude:
      glob:
        - 'features/**'
        - 'manual-testing-*.md'
        - '**/.env*'
        - '**/node_modules/**'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sivert-io/MatchZy
    - icon: fontawesome/brands/discord
      link: https://discord.gg/n7gHYau7aW
  generator: false

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: sivert-io
      repo: MatchZy
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Configuration: configuration.md
      - Commands: commands.md
      - Center Notifications: center-notifications.md
  - Integration:
      - Platform Integration: integration.md
      - LLM Quick Reference: LLM_QUICK_REFERENCE.md
  - Changelog: CHANGELOG.md

extra_css:
  - stylesheets/extra.css


